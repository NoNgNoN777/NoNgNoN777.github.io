<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"> </script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <title>VanillaFlow Calendar</title>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center py-10">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-6xl p-20">
        <button id="prevMonth"
            class="absolute left-10 top-1/2 transform -translate-y-1/2 bg-blue-200 hover:bg-blue-300 text-gray-700 font-bold py-4 px-8 rounded-md transition-colors duration-200">
            &#8592;
        </button>
        <button id="nextMonth"
            class="absolute right-10 top-1/2 transform -translate-y-1/2 bg-blue-200 hover:bg-blue-300 text-gray-700 font-bold py-4 px-8 rounded-md transition-colors duration-200">
            &#8594;
        </button>
        <div class="flex">
            <div id="calendarTitle" class="w-5/6 text-2xl font-bold text-gray-800 mb-4 text-center">VanillaFlow Calendar</div>
            <!-- ปุ่มเลือกปี -->
            <div class="w-1/6 flex-col items-center relative">
            <button id="yearDropdownBtn"
                class="px-3 py-1 border border-gray-300 rounded-md bg-white text-gray-700 w-40 flex justify-between items-center shadow-sm hover:bg-gray-50 transition">
                <span id="selectedYearText">2569 / 2026</span>
                <span class="text-xs">▼</span>
            </button>

            <div id="yearDropdownPanel"
                class="hidden absolute top-full mt-1 w-48 bg-white border border-gray-200 rounded-md shadow-xl z-10">
                <div class="p-2 border-b border-gray-100 bg-gray-50">
                    <input type="text" id="yearSearchInput"
                        class="w-full px-2 py-1 border border-gray-300 rounded text-sm outline-none focus:border-blue-500"
                        placeholder="พิมพ์ค้นหาปี...">
                </div>
                <ul id="yearList" class="max-h-48 overflow-y-auto text-sm"></ul>
            </div>
        </div>
        </div>
        <div class="grid grid-cols-7 gap-2 mb-4 text-center">
            <div class="text-red-500 font-semibold text-xl">Sun</div>
            <div class="text-gray-500 font-semibold text-xl">Mon</div>
            <div class="text-gray-500 font-semibold text-xl">Tue</div>
            <div class="text-gray-500 font-semibold text-xl">Wed</div>
            <div class="text-gray-500 font-semibold text-xl">Thu</div>
            <div class="text-gray-500 font-semibold text-xl">Fri</div>
            <div class="text-blue-500 font-semibold text-xl">Sat</div>
        </div>
        <div class="mb-4 p-3 bg-gray-50 rounded-xl shadow-inner border border-gray-200 flex justify-center gap-6 text-2xl">
            <span draggable="true" ondragstart="event.dataTransfer.setData('text/plain', '🎂')" class="cursor-grab hover:scale-125 hover:-translate-y-1 transition-transform">🎂</span>
            <span draggable="true" ondragstart="event.dataTransfer.setData('text/plain', '✈️')" class="cursor-grab hover:scale-125 hover:-translate-y-1 transition-transform">✈️</span>
            <span draggable="true" ondragstart="event.dataTransfer.setData('text/plain', '💻')" class="cursor-grab hover:scale-125 hover:-translate-y-1 transition-transform">💻</span>
            <span draggable="true" ondragstart="event.dataTransfer.setData('text/plain', '⚽')" class="cursor-grab hover:scale-125 hover:-translate-y-1 transition-transform">⚽</span>
            <span draggable="true" ondragstart="event.dataTransfer.setData('text/plain', '💰')" class="cursor-grab hover:scale-125 hover:-translate-y-1 transition-transform">💰</span>

            <div class="w-px h-8 bg-gray-300 mx-2"></div> 
            <img src="https://cdn-icons-png.flaticon.com/512/190/190411.png" draggable="true" ondragstart="event.dataTransfer.setData('text/uri-list', this.src)" class="w-8 h-8 cursor-grab hover:scale-125 transition-transform" alt="ดาว">
            <img src="https://cdn-icons-png.flaticon.com/512/753/753313.png" draggable="true" ondragstart="event.dataTransfer.setData('text/uri-list', this.src)" class="w-8 h-8 cursor-grab hover:scale-125 transition-transform" alt="หัวใจ">
            <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiRXMH4gerfTjPfELxmhJkT96mZPT0cprNmooJ5tPH4K9vYMJVXzdrf84PcLk5zpikgPhv6iSuCEJoGUS_DxjuG9F9fhibokxVQGNJtGINq_lsKZl3fNlbl6AX-ZPZ67d8cd4zBemwq3lf7cKxma1PLJA2H3UD6uy2KCHgCJTXXDgI3mQGNL7P0j_eVeg/s400/title.gif" draggable="true" ondragstart="event.dataTransfer.setData('text/uri-list', this.src)" class="w-auto h-8 cursor-grab hover:scale-125 transition-transform" alt="บิน">
            <img src="https://substackcdn.com/image/fetch/$s_!8Vxf!,f_auto,q_auto:good,fl_progressive:steep/https%3A%2F%2Fbucketeer-e05bbc84-baa3-437e-9518-adb32be77984.s3.amazonaws.com%2Fpublic%2Fimages%2F090cbb04-9222-46a7-b944-9bd561101cff_780x520.gif" draggable="true" ondragstart="event.dataTransfer.setData('text/uri-list', this.src)" class="w-auto h-8 cursor-grab hover:scale-125 transition-transform" alt="หายตัว">
            <img src="https://i.pinimg.com/originals/df/1a/ff/df1aff8395678d11b99b575f0e3b19d5.gif" draggable="true" ondragstart="event.dataTransfer.setData('text/uri-list', this.src)" class="w-auto h-8 cursor-grab hover:scale-125 transition-transform" alt="นอนหลับ">
        </div>
        <div id="calendarGrid" class="grid grid-cols-7 gap-2 text-center"></div>
        <div class="flex items-center justify-center ">
            <button id="thisMonth"
                class="mt-6 bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-6 rounded-md transition-colors duration-200 ">
                This Month
            </button>
        </div>

    </div>

</body>

</html>
<script src="App.js"></script>
